name: Sync with Upstream (saicaca/fuwari)

on:
  schedule:
    - cron: '0 0 * * *'          # 每天 UTC 00:00（日本时间早上 9:00）自动运行
  workflow_dispatch:            # 允许手动触发（推荐第一次测试）

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # 拉取完整历史，避免浅克隆问题

      - name: Fetch upstream changes
        run: |
          git remote add upstream https://github.com/saicaca/fuwari.git || true
          git fetch upstream

      - name: Merge upstream into main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories --no-edit || true   # 允许合并历史
          git push origin main

      - name: Commit any merge conflicts or changes (if needed)
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "chore: auto sync from upstream saicaca/fuwari" || echo "No changes to commit"
          git push origin main || echo "Push failed (maybe no changes)"
